name: Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Build docs
        run: |
          uv run --group docs python .github/scripts/override_site_url.py dev
          uv run --group docs zensical build --clean --config-file zensical.local.toml
          cp -r site /tmp/built-site

      - uses: ./.github/actions/deploy-to-gh-pages
        with:
          target: dev
          commit-message: Deploy dev docs

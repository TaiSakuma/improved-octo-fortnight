name: Deploy to gh-pages
description: Deploy built docs to a subdirectory on gh-pages

inputs:
  site-dir:
    description: Path to the built site
    required: true
  target:
    description: Subdirectory to deploy to
    required: true
  commit-message:
    description: Commit message
    required: true

outputs:
  url:
    description: Default GitHub Pages URL for the deployed subdirectory
    value: ${{ steps.url.outputs.url }}

runs:
  using: composite
  steps:
    # Save the current ref so we can restore it after deploying.
    - id: save-ref
      shell: bash
      run: echo "ref=$(git symbolic-ref HEAD 2>/dev/null || git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    # Switch to gh-pages, creating it as an orphan branch if needed.
    - shell: bash
      run: |
        git fetch origin gh-pages 2>/dev/null || true
        if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
          git checkout -B gh-pages origin/gh-pages
        else
          git checkout --orphan gh-pages
          git rm -rf .
          git clean -fd
        fi

    # Copy the built site into the target subdirectory, commit, and push.
    - shell: bash
      run: |
        TARGET="${{ inputs.target }}"
        rm -rf "$TARGET"
        mkdir -p "$(dirname "$TARGET")"
        cp -r "${{ inputs.site-dir }}" "$TARGET"
        touch .nojekyll
        git add .nojekyll "$TARGET"
        git diff --cached --quiet || git commit -m "${{ inputs.commit-message }}"
        git push origin gh-pages

    # Restore the original branch so subsequent steps can find local actions.
    - shell: bash
      run: git checkout "${{ steps.save-ref.outputs.ref }}"

    # Output the default GitHub Pages URL for the deployed subdirectory.
    - id: url
      shell: bash
      run: echo "url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ inputs.target }}/" >> "$GITHUB_OUTPUT"

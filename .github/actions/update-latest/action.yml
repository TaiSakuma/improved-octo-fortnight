name: Update latest and index.html
description: Copy built site to latest/, regenerate index.html, commit and push

inputs:
  site-dir:
    description: Path to the built site
    required: true
  repo-name:
    description: Repository name for the index page title
    required: true
  repo-url:
    description: Repository URL for the GitHub link
    required: true
  version:
    description: Version string for the commit message
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        rm -rf latest
        cp -r "${{ inputs.site-dir }}" latest
        python "${{ github.action_path }}/generate_index.py" \
          "${{ inputs.repo-name }}" \
          "${{ inputs.repo-url }}"
        git add latest index.html
        git diff --cached --quiet || git commit -m "Update latest and index.html for v${{ inputs.version }}"
        git push origin gh-pages
